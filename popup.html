<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h3>⚙️ DuoGPT Beta Settings</h3>
  <div id="version-check">🔄 Checking version...</div>
  
  <div class="field-group">
    <label for="apiKey">Google AI Studio API Key:</label>
    <input type="password" id="apiKey" placeholder="AIzaSy...">
  </div>

  <div class="field-group">
    <label for="geminiModel">Gemini Model:</label>
    <select id="geminiModel">
      <option value="gemini-2.5-flash">Gemini 2.5 Flash (Fast)</option>
      <option value="gemini-2.5-pro">Gemini 2.5 Pro (Deep Analysis)</option>
    </select>
  </div>
  
  <div class="field-group">
    <label for="userLang">Explanation Language:</label>
    <select id="userLang"></select>
  </div>

  <div class="toggle-group">
    <label for="aiWrongAnswers">Use AI on wrong answers</label>
    <input type="checkbox" id="aiWrongAnswers">
  </div>

  <button id="saveBtn" class="btn-duo btn-green">Save Settings</button>
  
  <a id="githubBtn" href="https://github.com/MisterX-byte-478104927/DuoGPT" target="_blank" class="btn-duo btn-blue">View on GitHub</a>
  <button id="donateBtn" class="btn-duo btn-orange" disabled>Donate Crypto (Soon)</button>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
